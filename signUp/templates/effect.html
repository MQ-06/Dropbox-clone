    <script>
      document.addEventListener("scroll", () => {
        const scrollTop = window.scrollY; // Amount scrolled from the top
        const windowHeight = window.innerHeight; // Height of the viewport
        const docHeight = document.body.scrollHeight; // Total height of the document

        // Calculate the scroll progress (0 to 1)
        const progress = Math.min(scrollTop / (docHeight - windowHeight), 1);

        // Set the CSS variable for animation progress
        document
          .querySelector(".animated-background")
          .style.setProperty("--animation-progress", progress);
      });
    </script>

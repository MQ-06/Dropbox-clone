<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Dropbox</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: flex-start; /* Align logo to the left */
            padding: 20px;
        }

        svg {
            fill: #fff;
        }

        main {
            padding: 40px 20px;
        }

        h2 {
            
            font-size: 2em;
            margin-top: -20px;
            margin-bottom: 10px;
        }

        .para {
            font-size: 15px;
            color: #ffffff;
            margin-top: 10px;
            margin-bottom: 50px;
        }

        fieldset {
            display: flex;
            justify-content: center;
            gap: 20px;
            border: none;
            padding: 0;
        }

        .card {
            border: 1px solid rgb(82, 79, 79);
            background-color: black;
            padding: 10px; 
            border-radius: 10px;
            width: 320px; 
            height: 400px; 
            text-align: center;
            position: relative;
            overflow: hidden; 
        }

        .card:hover {
            border: 2px solid #b0c4de; 
        }

        h3 {
            font-size: 1.2em;
            margin: 8px 0; 
        }

        p {
            font-size: 0.9em;
            color: #ccc;
            margin: 5px 0; 
        }

        img {
            width: 65%;
            height: auto; 
            border-radius: 5px;
            margin: 5px 0;
        }

        button {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.1em;
            cursor: pointer;
        }

        button:hover {
            color: #1e90ff;
        }
    </style>
</head>
<body>
    <div>
        <header>
            <div>
                <svg viewBox="0 0 24 24" width="56" height="56">
                    <path d="M8 5 4 7.5 8 10l-4 2.5L8 15l4-2.5 4 2.5 4-2.5-4-2.5 4-2.466L16 5l-4 2.5L8 5Zm4 2.5 4 2.5-4 2.5L8 10l4-2.5Z"></path>
                    <path d="m8 16.5 4-2.5 4 2.5-4 2.5-4-2.5Z"></path>
                </svg>
            </div>
        </header>
        <main>
            <div>
                <h2>Welcome to Dropbox, ONE</h2>
                <p class="para">What do you think you’ll mostly use Dropbox for?</p>
            </div>
            <fieldset>
                <div class="card">
                    <h3>
                        <button data-testid="entity-selection-input-PERSONAL">Personal</button>
                    </h3>
                    <div>
                        <img src="/Register/static/images/mariam1.jpg" alt="Personal Use" />
                        <p>
                            Edit and share photos and videos.<br />Save important files.
                        </p>
                    </div>
                </div>
                <div class="card">
                    <h3>
                        <button data-testid="entity-selection-input-WORK">Work</button>
                    </h3>
                    <div>
                        <img src="/Register/static/images/mariam2.jpg" alt="Work Use" />
                        <p>
                            Work with a team or clients.<br />Sync all your files to one place.
                        </p>
                    </div>
                </div>
                <div class="card">
                    <h3>
                        <button data-testid="entity-selection-input-SCHOOL">School</button>
                    </h3>
                    <div>
                        <img src="/Register/static/images/mariam3.jpg" alt="School Use" />
                        <p>
                            Collaborate on group assignments.<br />Build a work portfolio.
                        </p>
                    </div>
                </div>
            </fieldset>
        </main>
    </div>
</body>
</html>

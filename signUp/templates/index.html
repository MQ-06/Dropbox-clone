<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropbox Nav</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: black;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }

      .nav-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        background-color: black;
      }

      .dropbox-logo-container {
        display: flex;
        align-items: center;
      }

      .span-logo {
        display: inline-flex;
        background-color: #007ee5;
        padding: 3.8px;
      }

      .dropbox-text {
        color: white;
        font-size: 21px;
        font-weight: bold;
        margin-left: 5px;
        line-height: 1;
        position: relative;
        top: -5px;
      }

      .dropbox {
        text-decoration: none;
        color: white;
      }

      .nav-menu {
        display: flex;
        align-items: center;
        list-style-type: none;
        margin-left: -190px;
      }

      .nav-item {
        margin-right: 20px;
      }
      .nav-item span {
        font-weight: 600;
      }

      .nav-item button,
      .nav-item a {
        background: none;
        border: none;
        color: white;
        font-size: 14px;
        cursor: pointer;
      }

      .nav-item button:hover,
      .nav-item a:hover {
        color: #007ee5;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .icon-button {
        padding-top: 7px;
        background: none;
        border: none;
        cursor: pointer;
      }

      .icon-button svg {
        width: 24px;
        height: 24px;
        fill: white;
      }

      .nav-link {
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        padding-top: 7px;
      }

      .nav-link:hover {
        color: #007ee5;
      }

      .get-app {
        padding-top: 5px;
        position: relative;
      }

      .get-started {
        background-color: #f5f3f0;
        color: black;
        padding: 8px 15px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 550;
        text-align: center;
        font-size: 14px;
        margin-top: 9px;
      }

      .get-started:hover {
        background-color: #e0dcd5;
      }

      .arrow,
      .arrow-plan {
        font-size: 1.5rem;
      }

      .arrow-button:hover .arrow,
      .find-plan:hover .arrow-plan {
        transform: translateX(5px);
        transition: transform 0.3s ease;
      }

      .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: 120px;
      }

      .hero h1 {
        color: white;
      }

      .hero p {
        color: gray;
      }
    </style>
  </head>
  <body>
    <nav class="nav-bar">
      <div class="dropbox-logo-container">
        <a href="{% url 'homepage' %}" class="dropbox" title="Dropbox">
          <span class="span-logo">
            <svg
              width="26"
              height="25"
              viewBox="0 0 30 25"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M7.70076 0.320312L0.478516 4.91332L7.70076 9.50633L14.9242 4.91332L22.1465 9.50633L29.3687 4.91332L22.1465 0.320312L14.9242 4.91332L7.70076 0.320312Z"
                fill="#FFFFFF"
              ></path>
              <path
                d="M7.70076 18.6925L0.478516 14.0994L7.70076 9.50633L14.9242 14.0994L7.70076 18.6925Z"
                fill="#FFFFFF"
              ></path>
              <path
                d="M14.9242 14.0994L22.1465 9.50633L29.3687 14.0994L22.1465 18.6925L14.9242 14.0994Z"
                fill="#FFFFFF"
              ></path>
              <path
                d="M14.9242 24.8164L7.70077 20.2234L14.9242 15.6304L22.1465 20.2234L14.9242 24.8164Z"
                fill="#FFFFFF"
              ></path>
            </svg>
          </span>
          <span class="dropbox-text">Dropbox</span>
        </a>
      </div>

      <ul class="nav-menu">
        <li class="nav-item">
          <button
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="Products"
          >
            <span>Products</span>
            <!-- <span class="chevron">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path
                  d="m5.25 9.25 6.5 6.25 6.5-6.25"
                  stroke="currentColor"
                  stroke-width="1.5"
                ></path>
              </svg>
            </span> -->
          </button>
        </li>
        <li class="nav-item">
          <button
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="Solutions"
          >
            <span>Solutions</span>
            <!-- <span class="chevron">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <path
                  d="m5.25 9.25 6.5 6.25 6.5-6.25"
                  stroke="currentColor"
                  stroke-width="1.5"
                ></path>
              </svg>
            </span> -->
          </button>
        </li>
        <li class="nav-item">
          <a href="/enterprise" aria-label="Enterprise">
            <span>Enterprise</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="/plans" aria-label="Pricing">
            <span>Pricing</span>
          </a>
        </li>
      </ul>

      <div class="nav-right">
        <button class="icon-button" aria-label="Select a language">
          <svg viewBox="0 0 24 24">
            <path
              d="M11.75 4C6.535 4 4 6.535 4 11.75s2.535 7.75 7.75 7.75 7.75-2.535 7.75-7.75S16.965 4 11.75 4Zm5.714 4.5H14.87a9.237 9.237 0 0 0-.623-2.711A4.454 4.454 0 0 1 17.463 8.5ZM18 11.75c.002.586-.042 1.171-.133 1.75H14.97c.022-.579.03-1.167.03-1.75s-.008-1.171-.03-1.75h2.897c.09.579.135 1.164.133 1.75ZM11.75 18c-.616 0-1.3-.41-1.598-3h3.196c-.298 2.59-.982 3-1.598 3Zm-1.712-4.5c-.024-.524-.038-1.1-.038-1.75 0-.65.014-1.226.038-1.75h3.424c.024.524.038 1.1.038 1.75 0 .65-.014 1.226-.038 1.75h-3.424ZM5.5 11.75c-.002-.586.042-1.171.133-1.75H8.53c-.022.579-.03 1.167-.03 1.75s.008 1.171.03 1.75H5.633a11.074 11.074 0 0 1-.133-1.75Zm6.25-6.25c.616 0 1.3.41 1.598 3h-3.196c.298-2.59.982-3 1.598-3Zm-2.497.289A9.236 9.236 0 0 0 8.63 8.5H6.036a4.454 4.454 0 0 1 3.217-2.711ZM6.036 15H8.63c.07.93.28 1.844.623 2.711A4.453 4.453 0 0 1 6.037 15Zm8.21 2.711A9.237 9.237 0 0 0 14.87 15h2.594a4.454 4.454 0 0 1-3.217 2.711Z"
            ></path>
          </svg>
        </button>

        <a href="#" class="nav-link">Contact sales</a>
        <div class="get-app">
          <a href="#" class="nav-link">Get app</a>
        </div>
        <a href="{% url 'register' %}" class="nav-link">Sign up</a>
        <a href="{% url 'login' %}" class="nav-link">Log in</a>
        <a href="#" class="get-started">Get started</a>
      </div>
    </nav>

    <div class="hero">
      <div class="max-w-3xl text-center">
        <h1 class="text-4xl font-bold text-white sm:text-5xl">
          Get to work, with a lot less work
        </h1>
        <p class="mt-6 text-lg leading-8 text-gray-400">
          Dropbox delivers tools that help you move your work forward faster,
          keep it safe, and let you collaborate with ease.
        </p>

        <div class="mt-10 flex justify-center gap-x-6">
          <a
            href="#"
            class="rounded-xl bg-blue-500 px-5 py-4 text-lg font-semibold text-black text-sm shadow-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 arrow-button"
          >
            Sign up free
            <span class="arrow ml-2">→</span>
          </a>

          <a
            href="#"
            class="text-lg font-semibold leading-6 text-white flex items-center find-plan"
          >
            Find your plan
            <span class="arrow-plan ml-2">→</span>
          </a>
        </div>

        <p class="text-xs text-gray-300 mt-4 mr-48">No credit card required.</p>
      </div>
    </div>
  </body>
</html>

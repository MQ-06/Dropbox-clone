<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up or Log In</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #fff;
      }

      .nav-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 23px 20px;
        background-color: #fff;
        border-bottom: 1px solid #e0e0e0;
      }

      .dropbox {
        display: flex;
        align-items: center;
        text-decoration: none;
      }

      .span-logo {
        display: inline-flex;
        background-color: #0061ff;
        padding: 4px;
      }

      .dropbox-text {
        color: black;
        font-family: Arial, sans-serif;
        font-size: 21px;
        font-weight: bold;
        margin-left: 8px;
        line-height: 1;
        position: relative;
        top: -4px;
      }

      .container {
        max-width: 340px;
        margin: 100px auto;
        text-align: center;
      }

      .header {
        font-size: 24px;
        margin-bottom: 10px;
      }

      .sub-header {
        margin: 30px 0 26px;
        font-size: 16px;
      }

      .form-group {
        margin-bottom: 20px;
        text-align: left;
      }

      label {
        display: block;
        margin-bottom: 5px;
      }

      input[type="email"],
      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 15px;
        border: 1px solid #ddd;
        font-size: 13px;
      }
      input[type="email"]:focus,
      input[type="password"]:focus,
      input[type="text"]:focus {
        border: 3px solid #3a7de9;
        outline: none;
      }
      .name-fields {
        display: flex;
        color: #555;
        font-size: 13px;
        gap: 60px;
      }

      .form-group {
        color: #555;
        font-size: 13px;
      }
      .submit-btn {
        background-color: #2d75e8;
        color: white;
        padding: 18px;
        border: none;
        width: 110%;
        border-radius: 9px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 20px;
      }

      .agreement {
        margin-top: 10px;
        font-size: 13px;
        color: #666;
        text-align: left;
      }

      .agreement a {
        color: #0061ff;
        text-decoration: none;
      }

      .agreement a:hover {
        text-decoration: underline;
      }

      .back-link {
        display: flex;
        align-items: center;
        font-size: 14px;
        margin-bottom: 20px;
        cursor: pointer;
      }

      .back-link img {
        margin-right: 8px;
      }
      .footer {
        margin-top: 130px;
        display: flex;
        justify-content: center;
        gap: 18px;
        font-size: 14px;
        color: #555;
        padding: 20px 0px 0px 100px;
        justify-content: flex-start;
        text-align: left;
      }

      .footer a {
        color: #555;
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      hr {
        margin-top: 30px;
        width: 100px;
        border: none;
        border-top: 1px solid #797575;
        align-self: flex-start;
        margin-left: 100px;
        margin-bottom: 100px;
      }
    </style>
  </head>
  <body>
    <nav class="nav-bar">
      <div class="dropbox-logo-container">
        <a href="/" class="dropbox" title="Dropbox">
          <span class="span-logo">
            <svg
              width="26"
              height="25"
              viewBox="0 0 30 25"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M7.70076 0.320312L0.478516 4.91332L7.70076 9.50633L14.9242 4.91332L22.1465 9.50633L29.3687 4.91332L22.1465 0.320312L14.9242 4.91332L7.70076 0.320312Z"
                fill="#FFFFFF"
              ></path>
              <path
                d="M7.70076 18.6925L0.478516 14.0994L7.70076 9.50633L14.9242 14.0994L7.70076 18.6925Z"
                fill="#FFFFFF"
              ></path>
              <path
                d="M14.9242 14.0994L22.1465 9.50633L29.3687 14.0994L22.1465 18.6925L14.9242 14.0994Z"
                fill="#FFFFFF"
              ></path>
              <path
                d="M14.9242 24.8164L7.70077 20.2234L14.9242 15.6304L22.1465 20.2234L14.9242 24.8164Z"
                fill="#FFFFFF"
              ></path>
            </svg>
          </span>
          <span class="dropbox-text">Dropbox</span>
        </a>
      </div>
    </nav>

    <div class="container">
      <div class="back-link">
        <img
          src="https://img.icons8.com/material-rounded/24/000000/back.png"
          alt="Back"
        />
        <span>Back</span>
      </div>

      <div class="header">Sign up for free</div>
      <div class="sub-header">
        We recommend using your <strong>work email</strong>.
      </div>

      <form method="POST">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            value=""
            placeholder="Email"
            required
          />
        </div>

        <div class="form-group name-fields">
          <div style="flex: 1">
            <label for="first-name">First Name</label>
            <input
              type="text"
              id="first-name"
              name="first-name"
              placeholder=""
              required
            />
          </div>
          <div style="flex: 1">
            <label for="last-name">Last Name</label>
            <input
              type="text"
              id="last-name"
              name="last-name"
              placeholder=""
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder=""
            required
          />
        </div>

        <div class="agreement">
          By selecting "Agree and sign up," I agree to the
          <a href="#">Dropbox Terms</a> and <a href="#">Services Agreement</a>.
          Learn about how we use and protect your data in our
          <a href="#">Privacy Policy</a>.
        </div>

        <button class="submit-btn" type="submit">Agree and sign up</button>
      </form>
    </div>

    <footer class="footer">
      <a href="#">Privacy & terms</a>
      <a href="#">Cookie policy</a>
      <a href="#">Cookies & CCPA preferences</a>
      <a href="#">AI Principles</a>
    </footer>
    <hr />
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up or Log In</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        background-color: #fff;
      }

      .nav-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 23px 20px;
        background-color: #fff;
        border-bottom: 1px solid #e0e0e0;
      }

      .dropbox {
        display: flex;
        align-items: center;
        text-decoration: none;
      }

      .span-logo {
        display: inline-flex;
        background-color: #0061ff;
        padding: 7px;
      }

      .dropbox-text {
        color: black;
        font-family: Arial, sans-serif;
        font-size: 21px;
        font-weight: bold;
        margin-left: 8px;
        line-height: 1;
        position: relative;
        top: px;
      }

      .container {
        max-width: 350px;
        margin: 120px auto 0;
        padding: 0 20px;
        text-align: center;
      }

      .header {
        font-size: 24px;
        margin-bottom: 10px;
      }

      .sub-header {
        margin-top: 30px;
        font-size: 16px;
        margin-bottom: 26px;
      }

      .social-login {
        margin-bottom: 15px;
      }

      .social-login button {
        width: 100%;
        padding: 12px;
        margin-bottom: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .input-field:focus {
        border: 3px solid #3a7de9;
        outline: none;
      }
      .google-btn,
      .apple-btn {
        background-color: white;
        color: black;
      }

      .google-btn img,
      .apple-btn img {
        position: absolute;
        left: 15px;
      }

      .or-divider {
        margin: 20px 0;
        font-size: 14px;
        color: #888;
        position: relative;
        text-align: center;
      }

      .or-divider::before,
      .or-divider::after {
        content: "";
        width: 40%;
        height: 1px;
        background: #ddd;
        position: absolute;
        top: 50%;
      }

      .or-divider::before {
        left: 0;
      }

      .or-divider::after {
        right: 0;
      }

      .auth-field {
        margin-bottom: 20px;
      }

      .input-label {
        display: block;
        margin-bottom: 8px;
        text-align: left;
        font-size: 12px;
      }

      .input-field {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid black;
        font-size: 14px;
        box-sizing: border-box;
        transition: border-color 0.3s, box-shadow 0.3s;
      }

      .input-field:focus {
        border-color: 3px solid #1b70f9;
        outline: 1px solid black;
      }

      .submit-container {
        text-align: center;
      }

      .submit-button {
        width: 100%;
        padding: 12px;
        background-color: #0061ff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }
      .button-link {
        text-decoration: underline;
        color: white;
      }
      .button-text {
        display: block;
      }
      .submit-button:hover {
        background-color: #0a58d4;
      }

      .error-message {
        color: red;
        font-size: 12px;
      }
      .footer {
        margin-top: 150px;
        display: flex;
        justify-content: center;
        gap: 18px;
        font-size: 12px;
        color: #555;
        padding: 20px 0px 0px 100px;
        justify-content: flex-start;
        text-align: left;
      }

      .footer a {
        color: #555;
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      hr {
        margin-top: 30px;
        width: 100px;
        border: none;
        border-top: 1px solid #797575;
        align-self: flex-start;
        margin-left: 100px;
        margin-bottom: 100px;
      }
    </style>
  </head>
  <body>
    <nav class="nav-bar">
      <div class="dropbox-logo-container">
        <a href="/" class="dropbox" title="Dropbox">
          <span class="span-logo">
            <svg
              width="26"
              height="25"
              viewBox="0 0 30 25"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M7.70076 0.320312L0.478516 4.91332L7.70076 9.50633L14.9242 4.91332L22.1465 9.50633L29.3687 4.91332L22.1465 0.320312L14.9242 4.91332L7.70076 0.320312Z"
                fill="#FFFFFF"
              ></path>
              <path
                d="M7.70076 18.6925L0.478516 14.0994L7.70076 9.50633L14.9242 14.0994L7.70076 18.6925Z"
                fill="#FFFFFF"
              ></path>
              <path
                d="M14.9242 14.0994L22.1465 9.50633L29.3687 14.0994L22.1465 18.6925L14.9242 14.0994Z"
                fill="#FFFFFF"
              ></path>
              <path
                d="M14.9242 24.8164L7.70077 20.2234L14.9242 15.6304L22.1465 20.2234L14.9242 24.8164Z"
                fill="#FFFFFF"
              ></path>
            </svg>
          </span>
          <span class="dropbox-text">Dropbox</span>
        </a>
      </div>
    </nav>

    <div class="container">
      <div class="header">Sign up or log in</div>
      <div class="sub-header">
        We recommend using your <strong>work email</strong>.
      </div>

      <div class="social-login">
        <button class="google-btn">
          <img
            src="https://www.freepnglogos.com/uploads/google-logo-png/google-logo-png-suite-everything-you-need-know-about-google-newest-0.png"
            alt="Google logo"
            width="23"
          />
          Continue with Google
        </button>
        <button class="apple-btn">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg"
            alt="Apple logo"
            width="20"
          />
          Continue with Apple
        </button>
      </div>

      <div class="or-divider">or</div>

      {% csrf_token %}
      <form method="POST" novalidate="">
        <div class="auth-field">
          <label class="input-label" for="email">Email</label>
          <input
            id="email"
            type="email"
            class="input-field"
            name="susi_email"
            autocomplete="username"
            required
            placeholder="Enter your email"
          />
          <div
            id="email-error"
            class="error-message"
            aria-live="polite"
            aria-atomic="true"
          ></div>
        </div>
        <div class="submit-container">
          <button class="submit-button" type="submit">
            <a href="{% url 'agreement' %}" class="button-link">
              <span class="button-text">Continue</span>
            </a>
          </button>
        </div>
      </form>
    </div>
    <footer class="footer">
      <a href="#">Privacy & terms</a>
      <a href="#">Cookie policy</a>
      <a href="#">Cookies & CCPA preferences</a>
      <a href="#">AI Principles</a>
    </footer>
    <hr />
  </body>
</html>

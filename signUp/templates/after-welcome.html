<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropbox Clone</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: #1e1919;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 50px;
        height: 100vh;
        overflow: hidden;
      }

      .logo {
        position: absolute;
        top: 20px;
        left: 20px;
      }

      .logo svg {
        width: 40px;
        height: 40px;
      }

      .container {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
      }

      .progress-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
      }

      .quota-bar-container {
        background-color: #2e2e2e;
        width: 100%;
        max-width: 150px;
        height: 4px;
        border-radius: 5px;
        position: relative;
      }

      .quota-bar {
        background-color: #ffffff;
        height: 100%;
        width: 83%;
        border-radius: 5px;
      }

      .content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: 20px;
      }

      .title {
        font-size: 1.5em;
        font-weight: bold;
        margin-bottom: 20px;
        text-align: center;
      }

      .content-bubble {
        background-color: #1c1c1c;
        border-radius: 10px;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        max-width: 400px;
        width: 100%;
        transition: background-color 0.3s ease;
      }

      .content-text {
        text-align: left;
      }

      .content-text span {
        display: block;
        font-weight: bold;
        font-size: 1.1em;
        margin-bottom: 5px;
      }

      .content-text p {
        color: #aaaaaa;
        font-size: 0.9em;
      }

      .button-primary {
        background-color: #ffffff;
        color: #000000;
        padding: 10px 20px;
        border-radius: 5px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .button-primary:hover {
        background-color: #e0e0e0;
      }

      .footer {
        width: 100%;
        max-width: 600px;
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .footer-line {
        width: 260%;
        height: 1px;
        background-color: #2e2e2e;
        margin-bottom: 10px;
      }

      .footer-buttons {
        display: flex;
        width: 100%;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
      }

      .back-button {
        font-size: 18px;
        color: #ffffff;
        cursor: pointer;
        background: none;
        border: none;
        display: flex;
        align-items: flex-start;
        gap: 5px;
      }

      .skip-button {
        font-size: 18px;

        background: none;
        border: none;
        color: #ffffff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none">
        <path
          fill-rule="evenodd"
          clip-rule="evenodd"
          d="M8 5 4 7.5 8 10l-4 2.5L8 15l4-2.5 4 2.5 4-2.5-4-2.5 4-2.466L16 5l-4 2.5L8 5Zm4 2.5 4 2.5-4 2.5L8 10l4-2.5Z"
          fill="currentColor"
        />
        <path d="m8 16.5 4-2.5 4 2.5-4 2.5-4-2.5Z" fill="currentColor" />
      </svg>
    </div>

    <!-- Main container -->
    <div class="container">
      <!-- Header with progress bar -->
      <header class="progress-bar">
        <div class="quota-bar-container">
          <div class="quota-bar"></div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="content">
        <h1 class="title">Dropbox is faster on desktop</h1>
        <div id="content-bubble" class="content-bubble">
          <div class="content-text">
            <span>Get the desktop app</span>
            <p>
              Upload files faster, organize them easier, and save hard drive
              space.
            </p>
          </div>
          <button class="button-primary">
            <span>Install</span>
          </button>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-line"></div>
      <div class="footer-buttons">
        <button class="back-button">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            width="24"
            height="24"
            aria-label="Back"
          >
            <path
              d="M19 11.75H7m5.25 6.5L6 11.75l6.25-6.5"
              stroke="currentColor"
              stroke-width="1.5"
            />
          </svg>
          <span>Back</span>
        </button>
        <button class="skip-button">Skip</button>
      </div>
    </footer>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>After-welcome</title>

    <style>
      body {
        background-color: #121212;
        color: #ffffff;
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .full-screen-container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        width: 100%;
        max-width: 1200px;
      }

      .layout-wrapper {
        width: 100%;
        max-width: 900px;
        padding: 20px;
        text-align: center;
      }

      /* Header styling */
      .header {
        display: flex;
        justify-content: flex-start; /* Aligns logo to the left */
        align-items: center;
        margin-bottom: 20px;
      }

      .logo {
        display: flex;
        align-items: center;
      }

      .logo svg {
        fill: #ffffff;
      }

      .progress-bar {
        width: 50%;
        margin-left: 20px; /* Adds some space between logo and progress bar */
      }

      .quota-bar-container {
        background-color: #333;
        border-radius: 5px;
        overflow: hidden;
        width: 100%;
      }

      .quota-bar-container div[role="progressbar"] {
        background-color: #ffffff;
        height: 4px;
        width: 60%;
      }

      .body {
        margin: 20px 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .body h2 {
        font-size: 24px;
        margin-bottom: 20px;
      }

      .content-bubble {
        background-color: #1f1f1f;
        border-radius: 10px;
        padding: 20px;
        display: inline-block;
        max-width: 700px;
        width: 100%;
        text-align: left;
        margin-bottom: 20px; 
      }

      .content-bubble span {
        font-size: 18px;
        font-weight: bold;
      }

      .content-bubble p {
        font-size: 14px;
        color: #b3b3b3;
      }

      .button-primary {
        background-color: #ffffff;
        color: #121212;
        border: none;
        padding: 12px 24px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 20px;
      }

      .button-primary:hover {
        background-color: #f0f0f0;
      }

      .footer {
        display: flex;
        justify-content: center; 
        align-items: center;
        padding: 20px 0;
        border-top: 1px solid #333;
        width: 100%;
      }

      .button-borderless,
      .icon-button-borderless {
        background: none;
        border: none;
        color: #b3b3b3;
        cursor: pointer;
        margin: 0 10px; 
      }

      .button-borderless:hover,
      .icon-button-borderless:hover {
        color: #ffffff;
      }

      .icon-button-borderless svg {
        fill: currentColor;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="full-screen-container" data-testid="device-setup-screen">
        <div class="layout-wrapper">
          <header class="header">
            <div class="logo">
              <svg viewBox="0 0 24 24" fill="none" width="56" height="56">
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M8 5 4 7.5 8 10l-4 2.5L8 15l4-2.5 4 2.5 4-2.5-4-2.5 4-2.466L16 5l-4 2.5L8 5Zm4 2.5 4 2.5-4 2.5L8 10l4-2.5Z"
                  fill="currentColor"
                />
                <path
                  d="m8 16.5 4-2.5 4 2.5-4 2.5-4-2.5Z"
                  fill="currentColor"
                />
              </svg>
            </div>
            <div class="progress-bar">
              <div class="quota-bar-container">
                <div
                  role="progressbar"
                  aria-valuenow="83"
                  aria-valuemin="0"
                  aria-valuemax="100"
                  aria-label="Quota usage"
                  style="width: 83.33%"
                ></div>
              </div>
            </div>
          </header>
          <main class="body">
            <h2>Dropbox is faster on desktop</h2>
            <div class="content-bubble">
              <div>
                <span>Get the desktop app</span>
                <p>
                  Upload files faster, organize them easier, and save hard drive
                  space.
                </p>
              </div>
              <div>
                <button
                  class="button-primary"
                  data-testid="device-setup-install-button"
                >
                  <span>Install</span>
                </button>
              </div>
            </div>
          </main>
          <hr style="width: 100%; margin: 20px 0;" /> <!-- Horizontal line -->
          <footer class="footer">
            <button
              class="button-borderless"
              data-testid="onboarding-quiz-back-button-desktop"
            >
              <span>Back</span>
            </button>
            <button
              class="icon-button-borderless"
              data-testid="onboarding-quiz-back-button-mobile"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                width="24"
                height="24"
                aria-label="Back"
              >
                <path
                  d="M19 11.75H7m5.25 6.5L6 11.75l6.25-6.5"
                  stroke="currentColor"
                  stroke-width="1.5"
                />
              </svg>
            </button>
            <button
              class="button-borderless"
              data-testid="onboarding-quiz-skip-button"
            >
              <span>Skip</span>
            </button>
          </footer>
        </div>
      </div>
    </div>
  </body>
</html>
